name: Weekly Scrape

on:
  schedule:
    # Run at 18:00 UTC every Monday
    - cron: '0 18 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python bordshockey_scraper.py

      - name: Run Player Mapping
        run: python map_players.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: weekly data update"
          file_pattern: "bordshockey_results.csv player_id_map.csv unmapped_players.csv manual_mapping.json"
